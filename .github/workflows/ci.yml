name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Build / dev server / playwright が共通で必要とする env を 1 箇所にまとめる
env:
  NEXT_PUBLIC_SUPABASE_URL: https://ci.example.com
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon
  SUPABASE_SERVICE_ROLE_KEY: ci-service
  SESSION_SECRET: ci-session-secret-32-chars-for-tests
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: ci-vapid-public
  VAPID_PRIVATE_KEY: ci-vapid-private
  VAPID_SUBJECT: mailto:ci@example.com
  STRIPE_SECRET_KEY: sk_test_ci
  STRIPE_WEBHOOK_SECRET: whsec_ci
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
  NEXT_PUBLIC_APP_URL: https://mocal-iota.vercel.app
  CRON_SECRET: ci-cron

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Test (unit + security regression)
        run: npx vitest run --reporter=dot
      - name: Build (includes typecheck)
        run: npm run build
      - name: Lint
        run: npm run lint

      # E2E (#16 / F-09): Playwright で LP / 静的ページ / セキュリティヘッダー
      # 等を browser ベースで検証。Supabase 依存のフロー (store-order-flow.spec.ts)
      # は dummy env のため globalSetup が seed をスキップ → 該当テストも
      # graceful skip される。実 Supabase を CI で叩く場合は GitHub Actions
      # Secrets を設定して env を差し替える (将来の改善案)。
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: npx playwright test --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
